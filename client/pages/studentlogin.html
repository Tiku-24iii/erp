<!DOCTYPE html>
<html>
<head>
<title>Student Login</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-r from-blue-500 to-purple-600 h-screen flex items-center justify-center">

<div class="bg-white p-6 rounded-xl shadow w-80">

<h2 class="text-2xl font-bold text-center mb-4">Student Login</h2>

<input id="email" placeholder="Email" class="w-full p-2 border mb-2">
<input id="password" type="password" placeholder="Password" class="w-full p-2 border mb-3">

<button onclick="login()" class="w-full bg-blue-500 text-white p-2 rounded">
Login
</button>

</div>

<script>
function login(){

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    if(!email || !password){
        alert("Fill all fields");
        return;
    }

    fetch("http://localhost:5000/students/login",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({email,password})
    })
    .then(res=>{
        if(!res.ok){
            throw new Error("Login Failed");
        }
        return res.json();
    })
    .then(data=>{
        localStorage.setItem("student", JSON.stringify(data));
        window.location.href = "studentdashboard.html";
    })
    .catch(()=>{
        alert("Invalid Email or Password");
    });
}
</script>

</body>
</html>
