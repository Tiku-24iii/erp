<!DOCTYPE html>
<html>
<head>
<title>Exam</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-r from-blue-500 to-purple-600 min-h-screen flex justify-center items-center">

<div class="bg-white p-8 rounded-xl w-96 shadow-lg">

<h2 class="text-xl font-bold mb-4 text-center">Add Exam</h2>

<input id="name" placeholder="Exam Name" class="w-full p-2 border mb-2">
<input id="subject" placeholder="Subject" class="w-full p-2 border mb-2">
<input id="date" type="date" class="w-full p-2 border mb-2">
<input id="time" type="time" class="w-full p-2 border mb-2">
<input id="className" placeholder="Class (e.g. FY BSc)" class="w-full p-2 border mb-2">

<button onclick="addExam()" class="bg-blue-500 text-white w-full p-2 rounded">
Add Exam
</button>

<h3 class="mt-5 font-bold">All Exams</h3>
<ul id="list"></ul>

</div>

<script>

const list = document.getElementById("list");

function addExam() {
    const name = document.getElementById("name").value;
    const subject = document.getElementById("subject").value;
    const date = document.getElementById("date").value;
    const time = document.getElementById("time").value;
    const className = document.getElementById("className").value;

    if(!name || !subject || !date || !className){
        alert("Please fill all fields");
        return;
    }

    fetch("http://localhost:5000/exams/add", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ name, subject, date, time, className })
    })
    .then(res => res.json())
    .then(() => {
        alert("Exam Added ✅");
        loadExams();
    })
    .catch(err => console.log(err));
}

function loadExams() {
    fetch("http://localhost:5000/exams")
    .then(res => res.json())
    .then(data => {
        list.innerHTML = "";
        data.forEach(e => {
            list.innerHTML += `
            <li>
              ${e.name} | ${e.subject} | ${e.date} | ${e.time || "-"} | ${e.className}
            </li>`;
        });
    });
}

loadExams();

</script>

</body>
</html>
