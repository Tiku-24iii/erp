<!DOCTYPE html>
<html>
<head>
<title>Teacher Login</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="flex justify-center items-center h-screen bg-gradient-to-r from-purple-500 to-pink-500">

<div class="bg-white p-6 rounded w-80 shadow-lg">

<h2 class="text-2xl mb-4 text-center font-bold">
👨‍🏫 Teacher Login
</h2>

<input id="u" placeholder="Teacher Username" class="border p-2 w-full mb-2 rounded">
<input id="p" type="password" placeholder="Password" class="border p-2 w-full mb-3 rounded">

<button onclick="login()" class="bg-blue-500 text-white w-full p-2 rounded">
Login
</button>

</div>

<script>
function login(){
 let username=document.getElementById("u").value.trim();
 let password=document.getElementById("p").value.trim();

 if(!username || !password){
   alert("Enter all fields");
   return;
 }

 fetch("http://localhost:5000/auth/login",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({username,password})
 })
 .then(res=>res.json())
 .then(d=>{
  if(d.success){
    window.location="dashboard.html";
  } else {
    alert("Wrong login");
  }
 })
 .catch(()=>alert("Server error"));
}
</script>

</body>
</html>
