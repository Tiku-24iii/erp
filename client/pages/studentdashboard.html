<!DOCTYPE html>
<html>
<head>
<title>Student Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-gradient-to-r from-purple-500 to-pink-500 min-h-screen p-6">

<h1 class="text-white text-3xl mb-6 font-bold text-center">
Student Dashboard
</h1>

<button onclick="logout()"
class="bg-red-500 text-white px-4 py-2 rounded mb-4">
Logout
</button>

<!-- PROFILE -->
<div class="bg-white p-4 rounded shadow mb-4">
  <h2 class="font-bold text-lg">Profile</h2>
  <p id="profile"></p>
</div>

<!-- STATS -->
<div class="grid grid-cols-2 gap-4 mb-4">
<div class="bg-white p-4 rounded shadow">
Total Subjects: <span id="total">0</span>
</div>

<div class="bg-white p-4 rounded shadow">
Pass %: <span id="pass">0%</span>
</div>
</div>

<!-- CHART -->
<div class="bg-white p-4 rounded shadow mb-4">
<canvas id="chart"></canvas>
</div>

<!-- RESULTS -->
<div class="bg-white p-4 rounded shadow mb-4">
<h2 class="font-bold mb-2">My Results</h2>

<table class="w-full border">
<thead>
<tr class="bg-gray-200">
<th class="p-2 border">Subject</th>
<th class="p-2 border">Marks</th>
<th class="p-2 border">Status</th>
<th class="p-2 border">Grade</th>
</tr>
</thead>
<tbody id="resultTable"></tbody>
</table>
</div>

<!-- EXAMS -->
<div class="bg-white p-4 rounded shadow mb-4">
<h2 class="font-bold mb-2">My Exams</h2>

<table class="w-full border">
<thead>
<tr class="bg-gray-200">
<th class="p-2 border">Exam</th>
<th class="p-2 border">Subject</th>
<th class="p-2 border">Date</th>
<th class="p-2 border">Time</th>
</tr>
</thead>
<tbody id="examTable"></tbody>
</table>
</div>

<!-- ATTENDANCE -->
<div class="bg-white p-4 rounded shadow">
<h2 class="font-bold mb-2">Attendance</h2>
<p id="attendance"></p>
</div>

<script>

// LOGIN CHECK
const student = JSON.parse(localStorage.getItem("student"));

if(!student){
    window.location = "studentlogin.html";
}

// PROFILE (trim fix)
document.getElementById("profile").innerText =
    student.name.trim() + " | Class: " + student.className + " | Roll: " + student.rollNo;


// ================= RESULTS =================
fetch("http://localhost:5000/results")
.then(r=>r.json())
.then(data=>{

    let my = data.filter(x =>
        x.studentName.trim().toLowerCase() === student.name.trim().toLowerCase()
    );

    document.getElementById("total").innerText = my.length;

    let pass = my.filter(x=>x.status==="Pass").length;
    let fail = my.length - pass;

    document.getElementById("pass").innerText =
        (my.length ? (pass/my.length*100).toFixed(2) : 0)+"%";

    let html="";

    if(my.length === 0){
        html = `<tr><td colspan="4" class="text-center p-2">No Results Found</td></tr>`;
    }

    my.forEach(x=>{
        html += `
        <tr>
          <td class="border p-2">${x.subject}</td>
          <td class="border p-2">${x.marks}</td>
          <td class="border p-2">${x.status}</td>
          <td class="border p-2">${x.grade}</td>
        </tr>`;
    });

    document.getElementById("resultTable").innerHTML = html;

    new Chart(document.getElementById("chart"), {
        type:"pie",
        data:{
            labels:["Pass","Fail"],
            datasets:[{
                data:[pass,fail],
                backgroundColor:["green","red"]
            }]
        }
    });

});


// ================= EXAMS =================
fetch("http://localhost:5000/exams")
.then(r=>r.json())
.then(data=>{

    let html="";

    let filtered = data.filter(e => 
        !e.className || e.className === student.className
    );

    if(filtered.length === 0){
        html = `<tr><td colspan="4" class="text-center p-2">No Exams Found</td></tr>`;
    }

    filtered.forEach(e=>{
        html += `
        <tr>
          <td class="border p-2">${e.name}</td>
          <td class="border p-2">${e.subject}</td>
          <td class="border p-2">${e.date}</td>
          <td class="border p-2">${e.time || "-"}</td>
        </tr>`;
    });

    document.getElementById("examTable").innerHTML = html;

});


// ================= ATTENDANCE (FIXED 🔥) =================
fetch("http://localhost:5000/attendance")
.then(r=>r.json())
.then(data=>{

    let my = data.filter(x => 
        x.studentName.trim().toLowerCase() === student.name.trim().toLowerCase()
    );

    if(my.length === 0){
        document.getElementById("attendance").innerText = "No Attendance Data";
        return;
    }

    let present = my.filter(x=>x.status==="Present").length;

    document.getElementById("attendance").innerText =
        (present/my.length*100).toFixed(2) + "%";

});


// LOGOUT
function logout(){
    localStorage.removeItem("student");
    window.location = "studentlogin.html";
}

</script>

</body>
</html>
