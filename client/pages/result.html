<!DOCTYPE html>
<html>
<head>
    <title>Result System</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex items-center justify-center bg-gradient-to-r from-green-400 to-blue-500">

<div class="max-w-md w-full mx-auto p-5 bg-white rounded shadow">

<h2 class="text-2xl font-bold text-center mb-4">Add Result</h2>

<input id="studentName" placeholder="Student Name" class="w-full p-2 border rounded mb-2">
<input id="className" placeholder="Class" class="w-full p-2 border rounded mb-2">
<input id="rollNo" type="number" placeholder="Roll No" class="w-full p-2 border rounded mb-2">
<input id="subject" placeholder="Subject" class="w-full p-2 border rounded mb-2">
<input id="marks" type="number" placeholder="Marks" class="w-full p-2 border rounded mb-2">

<button onclick="addResult()" class="w-full bg-green-500 text-white p-2 rounded mb-3">
Add / Update Result
</button>

<h3 class="font-bold">All Results</h3>
<ul id="list" class="mt-2 space-y-2"></ul>

</div>

<script>

let editId = null;

// ================= ADD / UPDATE =================
function addResult() {

    let studentName = document.getElementById("studentName").value.trim();
    let className = document.getElementById("className").value.trim();
    let rollNo = Number(document.getElementById("rollNo").value);
    let subject = document.getElementById("subject").value.trim();
    let marks = Number(document.getElementById("marks").value);

    // VALIDATION
    if(!studentName || !className || !rollNo || !subject || marks === ""){
        alert("All fields required!");
        return;
    }

    // STATUS
    const status = marks >= 40 ? "Pass" : "Fail";

    // ✅ FIXED GRADE SYSTEM
    const grade =
        marks >= 75 ? "A" :
        marks >= 60 ? "B" :
        marks >= 50 ? "C" :
        marks >= 40 ? "D" : "F";

    const data = { studentName, className, rollNo, subject, marks, status, grade };

    let url = "http://localhost:5000/results/add";
    let method = "POST";

    if(editId){
        url = "http://localhost:5000/results/" + editId;
        method = "PUT";
    }

    fetch(url,{
        method,
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
    })
    .then(()=> {
        editId = null;
        loadResults();
        clearForm();
    });
}

// ================= LOAD =================
function loadResults() {
    fetch("http://localhost:5000/results")
    .then(res => res.json())
    .then(data => {
        const list = document.getElementById("list");
        list.innerHTML = "";

        if(data.length === 0){
            list.innerHTML = "<li>No Results Found</li>";
            return;
        }

        data.forEach(r => {
            list.innerHTML += `
            <li class="bg-gray-100 p-2 rounded shadow">
            <b>${r.studentName}</b> | Class: ${r.className || "-"} | Roll: ${r.rollNo || "-"} 
            <br>
            ${r.subject} | ${r.marks} | ${r.status} | ${r.grade}

            <button onclick="editResult('${r._id}','${r.studentName}','${r.className}','${r.rollNo}','${r.subject}','${r.marks}')"
            class="bg-yellow-400 px-2 ml-2 rounded">Edit</button>

            <button onclick="deleteResult('${r._id}')"
            class="bg-red-500 text-white px-2 ml-2 rounded">Delete</button>
            </li>`;
        });
    });
}

// ================= DELETE =================
function deleteResult(id){
    fetch(`http://localhost:5000/results/${id}`,{
        method:"DELETE"
    }).then(()=>loadResults());
}

// ================= EDIT =================
function editResult(id,name,className,rollNo,subject,marks){
    document.getElementById("studentName").value = name;
    document.getElementById("className").value = className;
    document.getElementById("rollNo").value = rollNo;
    document.getElementById("subject").value = subject;
    document.getElementById("marks").value = marks;

    editId = id;
}

// ================= CLEAR FORM =================
function clearForm(){
    document.getElementById("studentName").value="";
    document.getElementById("className").value="";
    document.getElementById("rollNo").value="";
    document.getElementById("subject").value="";
    document.getElementById("marks").value="";
}

// INIT
loadResults();

</script>

</body>
</html>
